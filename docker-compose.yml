version: "3.8"

services:
  # Database
  db:
    image: mysql:8
    container_name: drug_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Backend FastAPI
  backend:
    build: 
      context: ./backend
    container_name: drug_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db



  # Frontend Nginx
  frontend:
    build: 
      context: ./frontend
    container_name: drug_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: